name: SQLi Sniper Pipeline (Subfinder -> Katana -> GF -> Nuclei)

on:
  workflow_dispatch:
    inputs:
      domains:
        description: 'Domains separated by / (e.g., f.com/j.com/x.com)'
        required: false
        type: string
      file_path:
        description: 'Path to a domains .txt file in repo (one per line)'
        required: false
        type: string

jobs:
  sqli-sniper:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies & Configure GF
        run: |
          sudo apt-get update > /dev/null 2>&1
          # Install GF and create the exact regex pattern for SQLi parameters
          go install github.com/tomnomnom/gf@latest > /dev/null 2>&1
          mkdir -p ~/.gf
          # This pattern looks for common SQLi parameter names
          echo '{"patterns":["[?&](id|uid|pid|cat|action|page|user|role|key|search|query|item|article|news|doc|file|sort|order|filter|category_id|product_id)[0-9]*="]}' > ~/.gf/sqli.json
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Install ProjectDiscovery Tools
        run: |
          go install github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest > /dev/null 2>&1
          go install github.com/projectdiscovery/httpx/cmd/httpx@latest > /dev/null 2>&1
          go install github.com/projectdiscovery/katana/cmd/katana@latest > /dev/null 2>&1
          go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest > /dev/null 2>&1
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Update Nuclei Templates
        run: nuclei -ut > /dev/null 2>&1

      - name: Prepare Targets
        run: |
          touch targets.txt
          if [ -n "${{ github.event.inputs.domains }}" ]; then
            echo "${{ github.event.inputs.domains }}" | tr '/' '\n' | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$' >> targets.txt
          fi
          if [ -n "${{ github.event.inputs.file_path }}" ] && [ -f "${{ github.event.inputs.file_path }}" ]; then
            cat "${{ github.event.inputs.file_path }}" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$' >> targets.txt
          fi
          sort -u targets.txt -o targets.txt
          
          TARGET_COUNT=$(wc -l < targets.txt | xargs)
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=🎯 SQLi Sniper Starting for ${TARGET_COUNT} targets..." || true

      - name: Step 1 - Subfinder
        run: |
          cat targets.txt | while read -r target; do
            subfinder -d "$target" -silent
          done > all_subs.txt
          touch all_subs.txt

      - name: Step 2 - Httpx
        run: |
          if [ ! -s "all_subs.txt" ]; then exit 0; fi
          # Get status codes to send to telegram, and extract clean URLs for Katana
          cat all_subs.txt | httpx -silent -follow-redirects -status-code -no-color > httpx_results.txt
          awk '{print $1}' httpx_results.txt | sort -u > live_urls.txt
          touch live_urls.txt

      - name: Step 3 - Katana (Crawl for Parameters)
        run: |
          if [ ! -s "live_urls.txt" ]; then exit 0; fi
          # -jc ensures we ONLY crawl URLs that contain query parameters
          cat live_urls.txt | katana -d 3 -jc -aff -silent -o katana_all_params.txt
          touch katana_all_params.txt
          
          # Send to Telegram so you see exactly what Katana found
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
            -F chat_id="${TELEGRAM_CHAT_ID}" \
            -F document="@katana_all_params.txt" \
            -F caption="🕷️ Katana: Found $(wc -l < katana_all_params.txt | xargs) endpoints with parameters." || true

      - name: Step 4 - GF SQLi Filtering (The Speed Hack)
        run: |
          if [ ! -s "katana_all_params.txt" ]; then exit 0; fi
          # GF instantly strips out anything that doesn't look like a database query
          cat katana_all_params.txt | gf sqli > gf_sqli_urls.txt
          touch gf_sqli_urls.txt
          
          PARAM_COUNT=$(wc -l < gf_sqli_urls.txt | xargs)
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
            -F chat_id="${TELEGRAM_CHAT_ID}" \
            -F document="@gf_sqli_urls.txt" \
            -F caption="🔪 GF Filtered down to ${PARAM_COUNT} highly-probable SQLi endpoints." || true

      - name: Step 5 - Nuclei SQLi Scanner
        run: |
          if [ ! -s "gf_sqli_urls.txt" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=❌ GF found 0 SQLi-like parameters. Skipping Nuclei." || true
            exit 0
          fi
          
          # Nuclei runs incredibly fast now because it's only testing the juicy targets
          nuclei -l gf_sqli_urls.txt -tags sql -severity critical,high,medium -silent -o nuclei_sqli_results.txt
          touch nuclei_sqli_results.txt
          
          if [ -s "nuclei_sqli_results.txt" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
              -F chat_id="${TELEGRAM_CHAT_ID}" \
              -F document="@nuclei_sqli_results.txt" \
              -F caption="🚨🚨🚨 CONFIRMED SQL INJECTION VULNERABILITIES FOUND! 🚨🚨🚨" || true
          else
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=✅ Nuclei finished. No SQLi vulnerabilities detected on targeted endpoints." || true
          fi

      - name: Upload All Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sqli-sniper-run-${{ github.run_id }}
          path: |
            *.txt
          retention-days: 7
