name: SQLi & XSS Injection Sniper

on:
  workflow_dispatch:
    inputs:
      domains:
        description: 'Domains separated by / (e.g., f.com/j.com/x.com)'
        required: false
        type: string
      file_path:
        description: 'Path to a domains .txt file in repo (one per line)'
        required: false
        type: string

jobs:
  injection-sniper:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update > /dev/null 2>&1
          sudo apt-get install -y jq unzip > /dev/null 2>&1

      - name: Install Stable Nuclei (Prevents Memory Panics)
        run: |
          # Hardcoded stable release v3.3.0 to prevent go-install goroutine panics
          wget -q "https://github.com/projectdiscovery/nuclei/releases/download/v3.3.0/nuclei_3.3.0_linux_amd64.zip" -O nuclei.zip
          unzip -qo nuclei.zip -d nuclei_temp
          sudo mv nuclei_temp/nuclei /usr/local/bin/
          rm -rf nuclei.zip nuclei_temp
          nuclei -ut > /dev/null 2>&1

      - name: Install ProjectDiscovery Tools
        run: |
          go install github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest > /dev/null 2>&1
          go install github.com/projectdiscovery/httpx/cmd/httpx@latest > /dev/null 2>&1
          go install github.com/projectdiscovery/katana/cmd/katana@latest > /dev/null 2>&1
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Prepare Targets
        run: |
          touch targets.txt
          if [ -n "${{ github.event.inputs.domains }}" ]; then
            echo "${{ github.event.inputs.domains }}" | tr '/' '\n' | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$' >> targets.txt
          fi
          if [ -n "${{ github.event.inputs.file_path }}" ] && [ -f "${{ github.event.inputs.file_path }}" ]; then
            cat "${{ github.event.inputs.file_path }}" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$' >> targets.txt
          fi
          sort -u targets.txt -o targets.txt
          
          TARGET_COUNT=$(wc -l < targets.txt | xargs)
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=🎯 Injection Sniper Starting for ${TARGET_COUNT} targets..." || true

      - name: Step 1 - Subfinder
        run: |
          cat targets.txt | while read -r target; do
            subfinder -d "$target" -silent
          done > all_subs.txt
          touch all_subs.txt

      - name: Step 2 - Httpx
        run: |
          if [ ! -s "all_subs.txt" ]; then exit 0; fi
          cat all_subs.txt | httpx -silent -follow-redirects -status-code -no-color > httpx_results.txt
          awk '{print $1}' httpx_results.txt | sort -u > live_urls.txt
          touch live_urls.txt

      - name: Step 3 - Katana (Get ALL Params)
        run: |
          if [ ! -s "live_urls.txt" ]; then exit 0; fi
          cat live_urls.txt | katana -d 3 -jc -aff -silent -o katana_all_params.txt
          touch katana_all_params.txt

      - name: Step 4 - Nuclei (SQLi + XSS + Injections)
        run: |
          if [ ! -s "katana_all_params.txt" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=❌ Katana found 0 parameters to test." || true
            exit 0
          fi
          
          # -c 25 limits threads to prevent GitHub Actions Out-Of-Memory crashes
          # -tags covers SQLi, standard injections, and XSS
          nuclei -l katana_all_params.txt -tags sql,sqli,injection,xss,reflected-xss,dom-xss -severity critical,high,medium -c 25 -silent -o nuclei_results.txt
          touch nuclei_results.txt
          
          if [ -s "nuclei_results.txt" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
              -F chat_id="${TELEGRAM_CHAT_ID}" \
              -F document="@nuclei_results.txt" \
              -F caption="🚨 NUCLEI: SQLi / XSS / Injection Vulnerabilities Found!" || true
          else
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=✅ Nuclei finished. No vulnerabilities found." || true
          fi

      - name: Upload All Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: injection-sniper-run-${{ github.run_id }}
          path: |
            *.txt
          retention-days: 7
