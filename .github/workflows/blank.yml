name: Custom Nuclei Template Sniper

on:
  workflow_dispatch:
    inputs:
      domains:
        description: 'Domains separated by / (e.g., f.com/j.com/x.com)'
        required: false
        type: string
      file_path:
        description: 'Path to a .txt file in repo (one per line)'
        required: false
        type: string
      template_names:
        description: 'Type "all" to scan everything, or name/folder (e.g., far.yaml/danielfolder)'
        required: true
        type: string

jobs:
  custom-sniper:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update > /dev/null 2>&1
          sudo apt-get install -y jq unzip > /dev/null 2>&1

      - name: Install Stable Nuclei Engine
        run: |
          wget -q "https://github.com/projectdiscovery/nuclei/releases/download/v3.3.0/nuclei_3.3.0_linux_amd64.zip" -O nuclei.zip
          unzip -qo nuclei.zip -d nuclei_temp
          sudo mv nuclei_temp/nuclei /usr/local/bin/
          rm -rf nuclei.zip nuclei_temp

      - name: Install ProjectDiscovery Tools
        run: |
          go install github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest > /dev/null 2>&1
          go install github.com/projectdiscovery/httpx/cmd/httpx@latest > /dev/null 2>&1
          go install github.com/projectdiscovery/katana/cmd/katana@latest > /dev/null 2>&1
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Prepare Targets
        run: |
          touch targets.txt
          INPUT_DOMAINS="${{ github.event.inputs.domains }}"
          INPUT_FILE="${{ github.event.inputs.file_path }}"
          
          if [ -n "$INPUT_DOMAINS" ]; then
            echo "$INPUT_DOMAINS" | tr '/' '\n' | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$' >> targets.txt
          fi
          
          if [ -n "$INPUT_FILE" ] && [ -f "$INPUT_FILE" ]; then
            cat "$INPUT_FILE" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$' >> targets.txt
          fi
          
          sort -u targets.txt -o targets.txt
          
          TARGET_COUNT=$(wc -l < targets.txt | xargs)
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=Starting Custom Sniper for ${TARGET_COUNT} targets..." || true

      - name: Step 1 - Subfinder
        run: |
          cat targets.txt | while read -r target; do
            subfinder -d "$target" -silent
          done > all_subs.txt
          touch all_subs.txt

      - name: Step 2 - Httpx
        run: |
          if [ ! -s "all_subs.txt" ]; then exit 0; fi
          cat all_subs.txt | httpx -silent -follow-redirects -status-code -no-color > httpx_results.txt
          awk '{print $1}' httpx_results.txt | sort -u > live_urls.txt
          touch live_urls.txt

      - name: Step 3 - Katana
        run: |
          if [ ! -s "live_urls.txt" ]; then exit 0; fi
          cat live_urls.txt | katana -d 3 -jc -aff -silent -o katana_all_params.txt
          touch katana_all_params.txt

      - name: Step 4 - Generate Auto Error-Based SQLi Template
        run: |
          # This creates a brutal template on the fly that Nuclei normally misses
          cat << 'EOF' > auto-error-sqli.yaml
          id: auto-error-based-sqli
          info:
            name: Runtime Error-Based SQLi
            severity: high
            author: ai-sniper
          requests:
            - method: GET
              path:
                - "{{BaseURL}}"
              payloads:
                id:
                  - "'"
                  - "\""
                  - "`"
                  - "1 OR 1=1"
                  - "1 AND 1=2"
              matchers-condition: or
              matchers:
                - type: regex
                  regex:
                    - "SQL syntax.*?MySQL"
                    - "Warning.*?\\Wmysqli?_"
                    - "valid MySQL result"
                    - "MySqlClient\\."
                    - "PostgreSQL.*?ERROR"
                    - "Warning.*?\\Wpg_"
                    - "valid PostgreSQL result"
                    - "Npgsql\\."
                    - "Driver.*? SQL[\\-\\_]\\*Server"
                    - "OLE DB.*? SQL Server"
                    - "Warning.*?\\W(mssql|sqlsrv)_"
                    - "Unclosed quotation mark after the character string"
                    - "Microsoft OLE DB Provider for ODBC Drivers"
                    - "ORA-[0-9]+"
                    - "Oracle error"
                    - "Oracle.*?Driver"
                    - "Warning.*?\\W(oci|ora)_"
                    - "quoted string not properly terminated"
                    - "SQL command not properly ended"
                    - "Macromedia.*?SQL Server"
                    - "ODBC SQL Server Driver"
                    - "ODBC Microsoft Access Driver"
                    - "JET Database Engine"
                    - "Access Database Engine"
                    - "SQLite/JDBCDriver"
                    - "SQLite.Exception"
                    - "System.Data.SQLite.SQLiteException"
                    - "Warning.*?\\Wsqlite_"
                    - "Warning.*?\\WSQLite3::"
                    - "\\[SQLITE_ERROR\\]"
          EOF

      - name: Step 5 - Run Custom Templates + Auto SQLi
        run: |
          if [ ! -s "katana_all_params.txt" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=Katana found 0 parameters." || true
            exit 0
          fi
          
          TEMPLATES_INPUT="${{ github.event.inputs.template_names }}"
          TEMPLATES_ARGS=""
          FOUND=0
          
          if [ "$TEMPLATES_INPUT" = "all" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=Scanning repo for ALL templates + Auto Error SQLi..." || true
              
            while IFS= read -r tmpl; do
              TEMPLATES_ARGS="$TEMPLATES_ARGS -t $tmpl"
              FOUND=1
            done < <(find . -type f \( -name "*.yaml" -o -name "*.yml" \) ! -path "./.github/*")
          else
            IFS='/' read -ra ITEMS <<< "$TEMPLATES_INPUT"
            for item in "${ITEMS[@]}"; do
              item=$(echo "$item" | xargs)
              if [ -z "$item" ]; then continue; fi
              
              if [ -f "$item" ]; then
                TEMPLATES_ARGS="$TEMPLATES_ARGS -t $item"
                FOUND=1
              elif [ -f "${item}.yaml" ]; then
                TEMPLATES_ARGS="$TEMPLATES_ARGS -t ${item}.yaml"
                FOUND=1
              elif [ -f "${item}.yml" ]; then
                TEMPLATES_ARGS="$TEMPLATES_ARGS -t ${item}.yml"
                FOUND=1
              elif [ -d "$item" ]; then
                TEMPLATES_ARGS="$TEMPLATES_ARGS -t ${item}/"
                FOUND=1
              fi
            done
          fi
          
          # ALWAYS append the auto error-based SQLi template to the very end
          TEMPLATES_ARGS="$TEMPLATES_ARGS -t auto-error-sqli.yaml"
          
          nuclei -l katana_all_params.txt $TEMPLATES_ARGS -c 25 -silent -o nuclei_results.txt
          touch nuclei_results.txt
          
          if [ -s "nuclei_results.txt" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
              -F chat_id="${TELEGRAM_CHAT_ID}" \
              -F document="@nuclei_results.txt" \
              -F caption="VULNERABILITY FOUND!" || true
          else
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=Nuclei finished. No vulns found." || true
          fi

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: custom-sniper-run-${{ github.run_id }}
          path: |
            *.txt
            *.yaml
          retention-days: 7
