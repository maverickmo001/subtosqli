name: SQLi Sniper Pipeline (Fixed)

on:
  workflow_dispatch:
    inputs:
      domains:
        description: 'Domains separated by / (e.g., f.com/j.com/x.com)'
        required: false
        type: string
      file_path:
        description: 'Path to a domains .txt file in repo (one per line)'
        required: false
        type: string

jobs:
  sqli-sniper:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies & Configure GF
        run: |
          sudo apt-get update > /dev/null 2>&1
          go install github.com/tomnomnom/gf@latest > /dev/null 2>&1
          echo "$HOME/go/bin" >> $GITHUB_PATH
          
          # Write GF JSON safely using a heredoc to prevent quote escaping bugs
          mkdir -p ~/.gf
          cat << 'EOF' > ~/.gf/sqli.json
          {"patterns":["[?&](id|uid|pid|cat|action|page|user|role|key|search|query|item|article|news|doc|file|sort|order|filter|category_id|product_id)[0-9]*="]}
          EOF

      - name: Install Real Nuclei (Binary + Templates)
        run: |
          # Download official pre-compiled binary
          wget -q https://github.com/projectdiscovery/nuclei/releases/download/v3.1.4/nuclei_3.1.4_linux_amd64.zip -O nuclei.zip
          unzip -qo nuclei.zip -d nuclei_temp
          sudo mv nuclei_temp/nuclei /usr/local/bin/
          rm -rf nuclei.zip nuclei_temp
          
          # -ut downloads and updates the official ProjectDiscovery template repo automatically
          nuclei -ut > /dev/null 2>&1

      - name: Install ProjectDiscovery Tools
        run: |
          go install github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest > /dev/null 2>&1
          go install github.com/projectdiscovery/httpx/cmd/httpx@latest > /dev/null 2>&1
          go install github.com/projectdiscovery/katana/cmd/katana@latest > /dev/null 2>&1
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Prepare Targets
        run: |
          touch targets.txt
          if [ -n "${{ github.event.inputs.domains }}" ]; then
            echo "${{ github.event.inputs.domains }}" | tr '/' '\n' | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$' >> targets.txt
          fi
          if [ -n "${{ github.event.inputs.file_path }}" ] && [ -f "${{ github.event.inputs.file_path }}" ]; then
            cat "${{ github.event.inputs.file_path }}" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$' >> targets.txt
          fi
          sort -u targets.txt -o targets.txt
          
          TARGET_COUNT=$(wc -l < targets.txt | xargs)
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=🎯 SQLi Sniper Starting for ${TARGET_COUNT} targets..." || true

      - name: Step 1 - Subfinder
        run: |
          cat targets.txt | while read -r target; do
            subfinder -d "$target" -silent
          done > all_subs.txt
          touch all_subs.txt

      - name: Step 2 - Httpx
        run: |
          if [ ! -s "all_subs.txt" ]; then exit 0; fi
          cat all_subs.txt | httpx -silent -follow-redirects -status-code -no-color > httpx_results.txt
          awk '{print $1}' httpx_results.txt | sort -u > live_urls.txt
          touch live_urls.txt

      - name: Step 3 - Katana (Crawl for Parameters)
        run: |
          if [ ! -s "live_urls.txt" ]; then exit 0; fi
          cat live_urls.txt | katana -d 3 -jc -aff -silent -o katana_all_params.txt
          touch katana_all_params.txt
          
          # FIX: Only send if file actually has content inside it
          if [ -s "katana_all_params.txt" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
              -F chat_id="${TELEGRAM_CHAT_ID}" \
              -F document="@katana_all_params.txt" \
              -F caption="🕷️ Katana: Found $(wc -l < katana_all_params.txt | xargs) endpoints with parameters." || true
          else
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=❌ Katana found 0 parameters." || true
          fi

      - name: Step 4 - GF SQLi Filtering
        run: |
          if [ ! -s "katana_all_params.txt" ]; then exit 0; fi
          
          # FIX: Run gf properly and hide any stderr errors
          cat katana_all_params.txt | gf sqli > gf_sqli_urls.txt 2>/dev/null
          touch gf_sqli_urls.txt
          
          # FIX: Only send if GF actually found something
          if [ -s "gf_sqli_urls.txt" ]; then
            PARAM_COUNT=$(wc -l < gf_sqli_urls.txt | xargs)
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
              -F chat_id="${TELEGRAM_CHAT_ID}" \
              -F document="@gf_sqli_urls.txt" \
              -F caption="🔪 GF Filtered down to ${PARAM_COUNT} highly-probable SQLi endpoints." || true
          else
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=⚠️ GF didn't find standard SQLi params. Will test ALL Katana params as fallback..." || true
          fi

      - name: Step 5 - Nuclei SQLi Scanner (With Fallback)
        run: |
          # FIX: THE FALLBACK LOGIC
          # If GF found targets, use them. If GF was empty, use ALL Katana params instead.
          TARGETS="gf_sqli_urls.txt"
          if [ ! -s "$TARGETS" ]; then
            TARGETS="katana_all_params.txt"
          fi
          
          if [ ! -s "$TARGETS" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=❌ No parameters to test. Exiting." || true
            exit 0
          fi
          
          # Run Nuclei using the real binary and official templates
          nuclei -l "$TARGETS" -tags sql -severity critical,high,medium -silent -o nuclei_sqli_results.txt
          touch nuclei_sqli_results.txt
          
          if [ -s "nuclei_sqli_results.txt" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
              -F chat_id="${TELEGRAM_CHAT_ID}" \
              -F document="@nuclei_sqli_results.txt" \
              -F caption="🚨🚨🚨 CONFIRMED SQL INJECTION VULNERABILITIES FOUND! 🚨🚨🚨" || true
          else
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=✅ Nuclei finished. No SQLi vulnerabilities detected." || true
          fi

      - name: Upload All Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sqli-sniper-run-${{ github.run_id }}
          path: |
            *.txt
          retention-days:
