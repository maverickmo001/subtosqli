name: SQLi & DAST Sniper Pipeline

on:
  workflow_dispatch:
    inputs:
      domains:
        description: 'Domains separated by / (e.g., f.com/j.com/x.com)'
        required: false
        type: string
      file_path:
        description: 'Path to a domains .txt file in repo (one per line)'
        required: false
        type: string

jobs:
  sqli-dast-sniper:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies & Configure GF
        run: |
          sudo apt-get update > /dev/null 2>&1
          go install github.com/tomnomnom/gf@latest > /dev/null 2>&1
          echo "$HOME/go/bin" >> $GITHUB_PATH
          
          mkdir -p ~/.gf
          cat << 'EOF' > ~/.gf/sqli.json
          {"patterns":["[?&](id|uid|pid|cat|action|page|user|role|key|search|query|item|article|news|doc|file|sort|order|filter|category_id|product_id)[0-9]*="]}
          EOF

      - name: Install Real Nuclei (Binary + Templates)
        run: |
          wget -q https://github.com/projectdiscovery/nuclei/releases/download/v3.1.4/nuclei_3.1.4_linux_amd64.zip -O nuclei.zip
          unzip -qo nuclei.zip -d nuclei_temp
          sudo mv nuclei_temp/nuclei /usr/local/bin/
          rm -rf nuclei.zip nuclei_temp
          nuclei -ut > /dev/null 2>&1

      - name: Install ProjectDiscovery Tools
        run: |
          go install github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest > /dev/null 2>&1
          go install github.com/projectdiscovery/httpx/cmd/httpx@latest > /dev/null 2>&1
          go install github.com/projectdiscovery/katana/cmd/katana@latest > /dev/null 2>&1
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Prepare Targets
        run: |
          touch targets.txt
          if [ -n "${{ github.event.inputs.domains }}" ]; then
            echo "${{ github.event.inputs.domains }}" | tr '/' '\n' | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$' >> targets.txt
          fi
          if [ -n "${{ github.event.inputs.file_path }}" ] && [ -f "${{ github.event.inputs.file_path }}" ]; then
            cat "${{ github.event.inputs.file_path }}" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$' >> targets.txt
          fi
          sort -u targets.txt -o targets.txt
          
          TARGET_COUNT=$(wc -l < targets.txt | xargs)
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=🎯 SQLi & DAST Sniper Starting for ${TARGET_COUNT} targets..." || true

      - name: Step 1 - Subfinder
        run: |
          cat targets.txt | while read -r target; do
            subfinder -d "$target" -silent
          done > all_subs.txt
          touch all_subs.txt

      - name: Step 2 - Httpx
        run: |
          if [ ! -s "all_subs.txt" ]; then exit 0; fi
          cat all_subs.txt | httpx -silent -follow-redirects -status-code -no-color > httpx_results.txt
          awk '{print $1}' httpx_results.txt | sort -u > live_urls.txt
          touch live_urls.txt

      - name: Step 3 - Katana (Crawl for Parameters)
        run: |
          if [ ! -s "live_urls.txt" ]; then exit 0; fi
          # Silent crawl, no telegram messages for this step
          cat live_urls.txt | katana -d 3 -jc -aff -silent -o katana_all_params.txt
          touch katana_all_params.txt

      - name: Step 4 - GF SQLi Filtering
        run: |
          if [ ! -s "katana_all_params.txt" ]; then exit 0; fi
          # Silent filter, no telegram messages for this step
          cat katana_all_params.txt | gf sqli > gf_sqli_urls.txt 2>/dev/null
          touch gf_sqli_urls.txt

      - name: Step 5 - Nuclei Standard Injection Scanner
        run: |
          # Fallback logic: use GF targets if found, otherwise use ALL Katana params
          TARGETS="gf_sqli_urls.txt"
          if [ ! -s "$TARGETS" ]; then
            TARGETS="katana_all_params.txt"
          fi
          
          if [ ! -s "$TARGETS" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=❌ No parameters found to test." || true
            exit 0
          fi
          
          # Run Nuclei with expanded tags: sql, sqli, injection
          nuclei -l "$TARGETS" -tags sql,sqli,injection -severity critical,high,medium -silent -o nuclei_standard_results.txt
          touch nuclei_standard_results.txt
          
          # Send results ONLY for Nuclei
          if [ -s "nuclei_standard_results.txt" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
              -F chat_id="${TELEGRAM_CHAT_ID}" \
              -F document="@nuclei_standard_results.txt" \
              -F caption="🚨 NUCLEI STANDARD: SQL/Injection Vulnerabilities Found!" || true
          else
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=✅ Nuclei Standard: No SQL/Injection vulnerabilities found." || true
          fi

      - name: Step 6 - Nuclei DAST (Headless XSS/DOM Scanner)
        run: |
          # Use the exact same target list for DAST
          TARGETS="gf_sqli_urls.txt"
          if [ ! -s "$TARGETS" ]; then
            TARGETS="katana_all_params.txt"
          fi
          
          if [ ! -s "$TARGETS" ]; then exit 0; fi
          
          # Run DAST (spins up headless browser to test DOM/XSS/Forms)
          nuclei -l "$TARGETS" -dast -silent -o nuclei_dast_results.txt
          touch nuclei_dast_results.txt
          
          # Send results ONLY for Nuclei DAST
          if [ -s "nuclei_dast_results.txt" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
              -F chat_id="${TELEGRAM_CHAT_ID}" \
              -F document="@nuclei_dast_results.txt" \
              -F caption="🧠 NUCLEI DAST: Headless XSS/DOM Vulnerabilities Found!" || true
          else
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=✅ Nuclei DAST: No headless XSS/DOM vulnerabilities found." || true
          fi

      - name: Upload All Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sqli-dast-run-${{ github.run_id }}
          path: |
            *.txt
          retention-days: 7
